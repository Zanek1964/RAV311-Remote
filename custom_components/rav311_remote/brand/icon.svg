<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- RAV311 remote icon optimized for Home Assistant entity display -->
  <!-- Remote body -->
  <rect x="7" y="1" width="10" height="22" rx="2.5" fill="currentColor" opacity="0.15"/>
  <rect x="7" y="1" width="10" height="22" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Standby / Power buttons -->
  <rect x="8.5" y="3.5" width="3" height="1.5" rx="0.5" fill="currentColor" opacity="0.6"/>
  <rect x="12.5" y="3.5" width="3" height="1.5" rx="0.5" fill="currentColor" opacity="0.9"/>
  <!-- Input buttons row 1 -->
  <circle cx="9.5" cy="8" r="1" fill="currentColor"/>
  <circle cx="12" cy="8" r="1" fill="currentColor"/>
  <circle cx="14.5" cy="8" r="1" fill="currentColor"/>
  <!-- Input buttons row 2 -->
  <circle cx="9.5" cy="11" r="1" fill="currentColor"/>
  <circle cx="12" cy="11" r="1" fill="currentColor"/>
  <circle cx="14.5" cy="11" r="1" fill="currentColor"/>
  <!-- Nav pad -->
  <circle cx="12" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <circle cx="12" cy="16" r="1" fill="currentColor"/>
  <!-- DSP buttons -->
  <rect x="8.5" y="20.5" width="2.5" height="1.2" rx="0.4" fill="currentColor" opacity="0.7"/>
  <rect x="12.5" y="20.5" width="2.5" height="1.2" rx="0.4" fill="currentColor" opacity="0.7"/>
</svg>
